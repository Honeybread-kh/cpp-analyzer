# Expected dataflow analysis results for hw_model.c
# Used by benchmark tests to verify analysis correctness.
# Each entry: source → sink, with expected intermediate steps.
#
# ── 분석 능력 카테고리 ──
#   basic              : 단일 함수 내 직접 대입 또는 산술 변환 추적
#   alias_tracking     : 포인터 앨리어스 체인 (p=q; q->field=val)
#   macro_sink         : 매크로 호출을 sink으로 인식 (REG_WRITE 등)
#   inter_procedural   : 함수 경계를 넘는 데이터 흐름 추적
#   conditional_tracking : 조건 분기(if/else) 내부 대입 추적
#   compound_assignment  : 복합 대입 연산자(|=, <<=) 체인 역추적

paths:
  # ══════════════════════════════════════════════════════
  # Easy: 단일 함수 내 직접 대입
  # ══════════════════════════════════════════════════════

  # 패턴: regs->regs[THRESH_REG] = cfg->threshold
  # 설명: config 필드가 변환 없이 레지스터에 바로 대입
  - name: "direct threshold"
    source: "cfg->threshold"
    sink: "regs->regs[THRESH_REG]"
    min_depth: 2
    difficulty: easy

  # 패턴: regs->regs[DIM_REG] = cfg->width | (cfg->height << 16)
  # 설명: 두 config 필드가 비트 연산으로 합쳐져 하나의 레지스터에 대입
  - name: "direct dimension pack"
    source: "cfg->width"
    sink: "regs->regs[DIM_REG]"
    min_depth: 2
    difficulty: easy

  - name: "direct dimension pack (height)"
    source: "cfg->height"
    sink: "regs->regs[DIM_REG]"
    min_depth: 2
    difficulty: easy

  # 패턴: fw->clk_div = cfg->frequency / BASE_CLK
  # 설명: config 필드에 산술 변환(÷)을 적용하여 FW 파라미터에 대입
  - name: "config to FW clk_div"
    source: "cfg->frequency"
    sink: "fw->clk_div"
    expected_transform: "/ BASE_CLK"
    min_depth: 2
    difficulty: easy

  # 패턴: fw->processed_mode = cfg->mode | (cfg->enable << 16)
  # 설명: 비트OR 변환을 거쳐 FW 파라미터에 대입
  - name: "config to FW processed_mode"
    source: "cfg->mode"
    sink: "fw->processed_mode"
    min_depth: 2
    difficulty: easy

  # ══════════════════════════════════════════════════════
  # Medium: 앨리어스 / 매크로 / 조건분기 / 복합대입
  # ══════════════════════════════════════════════════════

  # 패턴: HwRegs* hw = get_hw_regs(); HwRegs* r = hw; r->regs[X] = val
  # 설명: 포인터가 다른 변수로 복사된 뒤 그 변수를 통해 레지스터에 쓰기.
  #        앨리어스 체인(r → hw → 원본)을 추적해야 sink 인식 가능.
  - name: "alias register write"
    source: "cfg->enable"
    sink: "r->regs[CTRL_REG]"
    requires: alias_tracking
    min_depth: 2
    difficulty: medium

  # 패턴: REG_WRITE(TIMING_REG, cfg->frequency)
  # 설명: 매크로 호출이 실제 레지스터 쓰기. 매크로 이름을 sink 패턴으로
  #        인식하고, 인자에서 값 변수를 추출해야 함.
  - name: "macro REG_WRITE frequency"
    source: "cfg->frequency"
    sink_pattern: "REG_WRITE.*TIMING_REG"
    requires: macro_sink
    min_depth: 2
    difficulty: medium

  - name: "macro REG_WRITE mode"
    source: "cfg->mode"
    sink_pattern: "REG_WRITE.*MODE_REG"
    requires: macro_sink
    min_depth: 2
    difficulty: medium

  # 패턴: if (cfg->enable) { regs->regs[X] = cfg->mode; } else { ... = 0; }
  # 설명: 조건 분기 내부의 대입문 추적. if/else 양쪽 모두 도달 가능.
  - name: "conditional register write"
    source: "cfg->mode"
    sink: "regs->regs[CTRL_REG]"
    requires: conditional_tracking
    min_depth: 2
    difficulty: medium

  # 패턴: val |= cfg->mode; val |= (cfg->threshold << 8); regs[X] = val
  # 설명: 복합 대입(|=) 체인을 역추적하여 원래 config 필드까지 도달.
  #        val의 reaching definition이 여러 개 (|= 각각).
  - name: "compound assignment chain"
    source: "cfg->mode"
    sink: "regs->regs[CTRL_REG]"
    requires: compound_assignment
    min_depth: 3
    difficulty: medium

  # ══════════════════════════════════════════════════════
  # Hard: 함수 경계를 넘는 inter-procedural 추적
  # ══════════════════════════════════════════════════════

  # 패턴: int div = compute_divider(cfg->frequency);
  #        int timing = compute_timing(div);
  #        regs->regs[TIMING_REG] = timing << 8;
  # 설명: 값이 return을 통해 3개 함수를 거쳐 전파.
  #        _trace_backward가 callee의 return 문으로 잠수하여
  #        return값 → 파라미터 → 호출자 인자 체인을 역추적.
  - name: "multi-hop: config → divider → timing → reg"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_hops: ["compute_divider", "compute_timing"]
    requires: inter_procedural
    min_depth: 4
    difficulty: hard

  # 패턴: config_to_fw(cfg, fw)  → fw->clk_div = cfg->frequency / BASE_CLK
  #        fw_to_hw(fw, regs)     → regs->regs[TIMING_REG] = fw->timing_val << 8
  # 설명: 값이 구조체 포인터 필드를 매개로 함수 간 전달.
  #        함수 A가 fw->field에 쓰고, 함수 B가 같은 fw->field를 읽는 패턴.
  #        호출자가 같은 포인터를 두 함수에 전달한다고 가정하고,
  #        필드 이름 기반으로 cross-function 연결을 수행해야 함.
  - name: "two-layer: config → fw → hw register"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_hops: ["config_to_fw", "fw_to_hw"]
    requires: inter_procedural
    min_depth: 4
    difficulty: hard

  # ══════════════════════════════════════════════════════
  # 확장: 새 패턴 (벤치마크 커버리지 확장)
  # ══════════════════════════════════════════════════════

  # 패턴: val = cfg->enable ? cfg->frequency : 0; regs[X] = val
  # 설명: 삼항 연산자 양쪽 분기에서 config 값 추출. _extract_variables가
  #        conditional_expression 내부의 field_expression을 재귀 탐색해야 함.
  - name: "ternary operator tracking"
    source: "cfg->enable"
    sink: "regs->regs[TIMING_REG]"
    requires: ternary_tracking
    min_depth: 3
    difficulty: medium

  # 패턴: params[0] = cfg->frequency; regs[X] = params[0]
  # 설명: 상수 인덱스 배열 원소를 통한 데이터 전달.
  #        _find_reaching_defs가 "params[0]" 문자열 매칭으로 동작 가능.
  - name: "array element constant index"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: array_element_tracking
    min_depth: 3
    difficulty: medium

  # 패턴: reg_val = (cfg->mode & 0xFF) | ((cfg->frequency & 0xFFF) << 8) | ...
  # 설명: 비트 마스크+시프트로 여러 config 필드를 하나의 레지스터 값에 패킹.
  #        _extract_variables가 중첩 binary_expression에서 field_expression 추출.
  - name: "bitfield shift+mask packing"
    source: "cfg->mode"
    sink: "regs->regs[CTRL_REG]"
    requires: bitfield_tracking
    min_depth: 3
    difficulty: medium

  # 패턴: g_cached_freq = cfg->frequency (함수 A); regs[X] = g_cached_freq (함수 B)
  # 설명: 전역 변수를 매개로 함수 간 데이터 전달. 임베디드 코드에서 흔한 패턴.
  #        같은 이름의 전역 변수에 대한 cross-function 검색 필요.
  - name: "global variable relay"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: global_tracking
    min_depth: 3
    difficulty: hard

  # 패턴: Config local_cfg = *cfg; regs[X] = local_cfg.threshold
  # 설명: 구조체 값 복사 후 복사본의 필드를 통해 레지스터에 쓰기.
  #        앨리어스 맵에서 local_cfg → cfg 연결 후 .와 -> 접근자 동치 처리.
  - name: "struct copy field access"
    source: "cfg->threshold"
    sink: "regs->regs[THRESH_REG]"
    requires: struct_copy_tracking
    min_depth: 3
    difficulty: medium

  # 패턴: if(en) val=cfg->frequency; else val=cfg->threshold; regs[X]=val
  # 설명: 같은 변수에 대한 복수 reaching def (phi-node).
  #        _find_reaching_defs가 if/else 양쪽 대입을 모두 반환해야 함.
  - name: "phi-node multiple reaching defs"
    source: "cfg->threshold"
    sink: "regs->regs[TIMING_REG]"
    requires: multi_reaching_def
    min_depth: 3
    difficulty: medium

  # ══════════════════════════════════════════════════════
  # Range constraints: config 필드의 min/max 범위 추출
  # ══════════════════════════════════════════════════════

  # 패턴: if (freq < MIN_FREQ) freq = MIN_FREQ; if (freq > MAX_FREQ) freq = MAX_FREQ;
  # 설명: config 필드가 clamp 처리를 거쳐 레지스터에 도달.
  #        dataflow path에 range 제약 정보(MIN_FREQ, MAX_FREQ)가 포함되어야 함.
  - name: "range clamp frequency"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: range_tracking
    min_depth: 2
    difficulty: medium

  # 패턴: if (thresh > MAX_THRESHOLD) thresh = MAX_THRESHOLD;
  # 설명: 상한만 있는 saturate 패턴.
  - name: "range saturate threshold"
    source: "cfg->threshold"
    sink: "regs->regs[THRESH_REG]"
    requires: range_tracking
    min_depth: 2
    difficulty: medium

  # ══════════════════════════════════════════════════════
  # Dependency: 같은 레지스터에 기여하는 여러 config 필드
  # ══════════════════════════════════════════════════════

  # 패턴: ctrl = (cfg->frequency / BASE_CLK) | (cfg->mode << 16); regs[CTRL]=ctrl
  # 설명: 두 config 필드가 하나의 레지스터 값에 합쳐짐.
  #        cfg->frequency와 cfg->mode가 CTRL_REG의 co-dependent source.
  - name: "dependency freq+mode to ctrl"
    source: "cfg->frequency"
    sink: "regs->regs[CTRL_REG]"
    requires: dependency_tracking
    min_depth: 3
    difficulty: medium

  # 패턴: if (cfg->enable) { regs[TIMING] = cfg->frequency; }
  # 설명: enable이 frequency의 기록 여부를 제어하는 gating dependency.
  - name: "dependency enable gates frequency"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: dependency_tracking
    min_depth: 2
    difficulty: medium

  # ══════════════════════════════════════════════════════
  # Enum tracking: enum-typed config → register
  # ══════════════════════════════════════════════════════

  # 패턴: regs->regs[MODE_REG] = ecfg->op_mode
  # 설명: enum 타입(OpMode) 필드가 레지스터에 직접 대입
  - name: "enum config op_mode"
    source: "ecfg->op_mode"
    sink: "regs->regs[MODE_REG]"
    requires: enum_tracking
    min_depth: 2
    difficulty: easy

  # 패턴: regs->regs[CTRL_REG] = ecfg->clk_src
  # 설명: enum 타입(ClkSource) 필드가 레지스터에 직접 대입
  - name: "enum config clk_src"
    source: "ecfg->clk_src"
    sink: "regs->regs[CTRL_REG]"
    requires: enum_tracking
    min_depth: 2
    difficulty: easy

  # 패턴: int pwr = ecfg->power_level; ... regs->regs[THRESH_REG] = pwr
  # 설명: config 필드가 range clamp을 거쳐 레지스터에 도달
  - name: "enum range power_level"
    source: "ecfg->power_level"
    sink: "regs->regs[THRESH_REG]"
    requires: enum_tracking
    min_depth: 2
    difficulty: easy

  # ══════════════════════════════════════════════════════
  # Extended range & volatile MMIO (Gap C4 + A3)
  # ══════════════════════════════════════════════════════

  # 패턴: freq = (freq > MAX_FREQ) ? MAX_FREQ : freq
  # 설명: 삼항 연산자를 통한 clamp
  - name: "ternary clamp frequency"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: ternary_range
    min_depth: 2
    difficulty: medium

  # 패턴: thresh = CLAMP(cfg->threshold, 0, MAX_THRESHOLD)
  # 설명: CLAMP 매크로 호출을 통한 범위 제한
  - name: "CLAMP macro threshold"
    source: "cfg->threshold"
    sink: "regs->regs[THRESH_REG]"
    requires: clamp_macro
    min_depth: 2
    difficulty: medium

  # 패턴: *(volatile uint32_t*)(HW_BASE + 0x00) = cfg->frequency
  # 설명: 매크로 없이 직접 volatile 포인터 cast로 MMIO 쓰기
  - name: "volatile MMIO direct write"
    source: "cfg->frequency"
    sink_pattern: "volatile.*uint32_t"
    requires: volatile_mmio
    min_depth: 2
    difficulty: medium

  - name: "volatile MMIO mode write"
    source: "cfg->mode"
    sink_pattern: "volatile.*uint32_t"
    requires: volatile_mmio
    min_depth: 2
    difficulty: medium

  # 패턴: freq = MIN(freq, MAX_FREQ); freq = MAX(freq, MIN_FREQ)
  # 설명: MIN/MAX 매크로를 통한 범위 제한
  - name: "MIN/MAX macro range"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    requires: minmax_macro
    min_depth: 2
    difficulty: medium

  # 패턴: pr.parts.low = cfg->mode; regs[X] = pr.raw
  # 설명: union 타입의 raw 멤버 읽기는 parts.* 멤버 쓰기와 storage 공유
  - name: "union aliasing mode via raw"
    source: "cfg->mode"
    sink: "regs->regs[CTRL_REG]"
    requires: union_aliasing
    min_depth: 3
    difficulty: hard

  - name: "union aliasing frequency via raw"
    source: "cfg->frequency"
    sink: "regs->regs[CTRL_REG]"
    requires: union_aliasing
    min_depth: 3
    difficulty: hard

  # ══════════════════════════════════════════════════════
  # Function pointer indirect call (Gap A1)
  # ══════════════════════════════════════════════════════

  # 패턴: reg_writer_t writer = write_timing_fn; writer(regs, cfg->frequency)
  # 설명: 함수 포인터 변수를 통한 간접 호출. writer → write_timing_fn 로컬 앨리어스 해석 필요.
  - name: "fnptr local variable dispatch"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_function: "fnptr_dispatch"
    requires: fnptr_tracking
    min_depth: 3
    difficulty: hard

  # 패턴: ops.timing_fn = write_timing_fn; ops.timing_fn(regs, cfg->frequency)
  # 설명: 구조체 필드에 함수 포인터를 저장하고 그 필드를 통해 호출.
  - name: "fnptr struct field dispatch"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_function: "fnptr_struct_dispatch"
    requires: fnptr_tracking
    min_depth: 3
    difficulty: hard

  - name: "fnptr struct field dispatch mode"
    source: "cfg->mode"
    sink: "regs->regs[MODE_REG]"
    expected_function: "fnptr_struct_dispatch"
    requires: fnptr_tracking
    min_depth: 3
    difficulty: hard

  # ══════════════════════════════════════════════════════
  # Callback via global function pointer (Gap A4)
  # ══════════════════════════════════════════════════════

  # 패턴: g_event_cb = on_event_write (register_event_cb)
  #        g_event_cb(regs, cfg->enable) (trigger_event) → CTRL_REG
  - name: "callback via global fnptr"
    source: "cfg->enable"
    sink: "regs->regs[CTRL_REG]"
    expected_function: "trigger_event"
    requires: callback_tracking
    min_depth: 3
    difficulty: hard

  # ══════════════════════════════════════════════════════
  # Type casting passthrough (Gap C2)
  # ══════════════════════════════════════════════════════

  # 패턴: regs->regs[X] = (uint32_t)cfg->frequency
  - name: "cast direct frequency"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_function: "cast_write"
    requires: cast_tracking
    min_depth: 2
    difficulty: medium

  - name: "cast parenthesized mode"
    source: "cfg->mode"
    sink: "regs->regs[MODE_REG]"
    expected_function: "cast_write"
    requires: cast_tracking
    min_depth: 2
    difficulty: medium

  # 패턴: v = (uint32_t)cfg->threshold; regs[X] = (uint32_t)v
  - name: "cast chained through local"
    source: "cfg->threshold"
    sink: "regs->regs[THRESH_REG]"
    expected_function: "cast_intermediate"
    requires: cast_tracking
    min_depth: 3
    difficulty: medium

  # ══════════════════════════════════════════════════════
  # Struct array indexing (Gap A5)
  # ══════════════════════════════════════════════════════

  # 패턴: ch[0].freq = cfg->frequency (init_channels)
  #        regs[X] = channels[0].freq (array_struct_write)
  - name: "struct array cross-func freq"
    source: "cfg->frequency"
    sink: "regs->regs[TIMING_REG]"
    expected_function: "array_struct_write"
    requires: struct_array_indexing
    min_depth: 3
    difficulty: hard

  - name: "struct array cross-func mode"
    source: "cfg->mode"
    sink: "regs->regs[MODE_REG]"
    expected_function: "array_struct_write"
    requires: struct_array_indexing
    min_depth: 3
    difficulty: hard

# Scoring: each found path = 1 point
# Difficulty multiplier: easy=1, medium=2, hard=3
# Total possible score: sum of all (1 * multiplier)
