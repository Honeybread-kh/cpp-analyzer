name: Dataflow Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'cpp_analyzer/analysis/**'
      - 'tests/test_dataflow.py'
      - 'tests/fixtures/dataflow/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run benchmark tests
        run: |
          pytest tests/test_dataflow.py -v --tb=short 2>&1 | tee benchmark_output.txt

      - name: Check for regression
        run: |
          python -c "
          import json, sys
          report = json.load(open('_benchmark_report.json'))
          pct = report['pct']
          gaps = report['gaps']
          print(f'Score: {report[\"score\"]}/{report[\"max_score\"]} ({pct}%)')
          print(f'Gaps: {len(gaps)}')
          for g in gaps:
              print(f'  - {g[\"name\"]} (requires: {g[\"requires\"]})')
          # Fail if score drops below baseline
          BASELINE = 70  # current: 71.4%
          if pct < BASELINE:
              print(f'REGRESSION: score {pct}% < baseline {BASELINE}%')
              sys.exit(1)
          "

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: _benchmark_report.json
